name: Deploy to AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ap-south-2

    - name: Login to ECR
      run: |
          aws ecr get-login-password --region ap-south-2 \
          | docker login --username AWS --password-stdin 049559536960.dkr.ecr.ap-south-2.amazonaws.com

    - name: Build image
      run: docker build -t blogautomation .

    - name: Tag image
      run: docker tag blogautomation:latest 049559536960.dkr.ecr.ap-south-2.amazonaws.com/mello/blogautomation:latest

    - name: Push image
      run: docker push 049559536960.dkr.ecr.ap-south-2.amazonaws.com/mello/blogautomation:latest
